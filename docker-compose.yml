version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - ~/.m2:/root/.m2
    env_file:
      - ./backend/.env
    networks:
      - allfix-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # Browser calls backend at localhost. Use backend:8080 for SSR.
      - VITE_API_URL=http://localhost:8080 
    networks:
      - allfix-network
    depends_on:
      - backend

networks:
  allfix-network:
    driver: bridge