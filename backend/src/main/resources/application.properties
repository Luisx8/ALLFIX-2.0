spring.config.import=optional:file:.env[.properties]

server.port=${SERVER_PORT:8080}

# Firebase
firebase.project-id=${FIREBASE_PROJECT_ID:}
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:./serviceAccountKey.json}
firebase.storage-bucket=${FIREBASE_STORAGE_BUCKET:}

# File upload limits (base64 images can be large)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=10MB

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# CORS
frontend.url=${FRONTEND_URL:http://localhost:5173}

# Logging
logging.level.root=${LOG_LEVEL:INFO}
logging.level.ph.allfix=DEBUG

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always

# Spring Mail (SMTP with APP_PASSWORD)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${EMAIL_USERNAME:}
spring.mail.password=${APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

